name: Verify static files

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Required paths exist
        run: |
          test -f index.html
          test -f favicon.svg
          test -f 404.html
          test -f .github/workflows/pages.yml
          test -d assets
          test -f assets/www.promptanatomy.app.pdf
          test -f assets/www.promptanatomy.app-en.pdf
          test -f assets/prompt-library-en.js
          test -f package.json
          test -f scripts/build-locale-pages.js
          test -f scripts/verify-library-keys.js
          test -f scripts/verify-en-locale.js
      - name: Build locale pages
        run: |
          set -euo pipefail
          npm install
          npm run build
      - name: Locale HTML checks
        run: |
          set -euo pipefail
          test -f site/index.html
          test -f site/lt/index.html
          test -f site/en/index.html
          grep -q 'lang="lt"' site/lt/index.html
          grep -q 'lang="en"' site/en/index.html
          grep -q 'page-locale" content="en"' site/en/index.html
          grep -q 'hreflang="en"' site/en/index.html
      - name: LT or EN drift checks
        run: |
          set -euo pipefail
          npm run verify
      - name: Prevent MD→PDF drift (PRs)
        if: ${{ github.event_name == 'pull_request' }}
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          if [ -z "${BASE_REF:-}" ]; then
            echo "BASE_REF not set; skipping."
            exit 0
          fi
          git fetch origin "${BASE_REF}" --depth=1
          CHANGED="$(git diff --name-only FETCH_HEAD...HEAD || true)"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -qx 'docs/pamoka-1-pdf.md'; then
            if ! echo "$CHANGED" | grep -qx 'assets/www.promptanatomy.app.pdf'; then
              echo "docs/pamoka-1-pdf.md changed but assets/www.promptanatomy.app.pdf did not. Rebuild PDF."
              exit 1
            fi
          fi
          if echo "$CHANGED" | grep -qx 'docs/pamoka-1-pdf-en.md'; then
            if ! echo "$CHANGED" | grep -qx 'assets/www.promptanatomy.app-en.pdf'; then
              echo "docs/pamoka-1-pdf-en.md changed but assets/www.promptanatomy.app-en.pdf did not. Rebuild PDF."
              exit 1
            fi
          fi
