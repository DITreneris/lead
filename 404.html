<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puslapis nerastas (404) — Promptų anatomija</title>
    <meta name="robots" content="noindex">
    <style>
        :root {
            --bg: #071b29;
            --text: #f8fafc;
            --muted: #94a3b8;
            --accent: #fbd304;
            --link: #e2e8f0;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }
        main {
            max-width: 28rem;
            text-align: center;
        }
        h1 {
            font-size: clamp(1.25rem, 4vw, 1.5rem);
            font-weight: 700;
            margin: 0 0 12px;
        }
        p { margin: 0 0 20px; color: var(--muted); font-size: 1rem; }
        a {
            display: inline-block;
            color: var(--bg);
            background: var(--accent);
            font-weight: 700;
            text-decoration: none;
            padding: 12px 22px;
            border-radius: 8px;
        }
        a:hover { filter: brightness(1.05); }
        a:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
        .sub { margin-top: 16px; font-size: 0.9rem; }
        .sub a {
            display: inline;
            background: none;
            color: var(--link);
            padding: 0;
            text-decoration: underline;
            font-weight: 600;
        }
        .sub a:hover { color: #fff; }
    </style>
</head>
<body>
    <main>
        <h1>Puslapis nerastas</h1>
        <p>Šio adreso čia nėra. Grįžkite į pamoką arba oficialią svetainę.</p>
        <p><a href="./index.html">Atidaryti pamoką</a></p>
        <p class="sub"><a href="https://www.promptanatomy.app/" rel="noopener">www.promptanatomy.app</a></p>
    </main>
</body>
</html>
